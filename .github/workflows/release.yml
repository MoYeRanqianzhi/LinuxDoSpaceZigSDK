name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to release, for example v0.1.0
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: zig-release
  cancel-in-progress: false

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Install Zig
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y curl xz-utils python3
          python3 - <<'PY' > /tmp/zig-url.txt
          import json
          import urllib.request

          with urllib.request.urlopen("https://ziglang.org/download/index.json") as response:
            data = json.load(response)

          versions = []
          for key in data:
            if key == "master":
              continue
            parts = tuple(int(piece) for piece in key.split("."))
            versions.append((parts, key))

          _, latest = max(versions)
          print(data[latest]["x86_64-linux"]["tarball"])
          PY
          zig_url="$(cat /tmp/zig-url.txt)"
          curl -fsSL "${zig_url}" -o /tmp/zig.tar.xz
          mkdir -p /tmp/zig
          tar -xf /tmp/zig.tar.xz -C /tmp/zig --strip-components=1
          echo "/tmp/zig" >> "${GITHUB_PATH}"

      - name: Resolve release tag
        id: meta
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          release_tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            release_tag="${INPUT_TAG}"
          fi
          echo "release_tag=${release_tag}" >>"$GITHUB_OUTPUT"

      - name: Build package
        run: zig build

      - name: Create source archive
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
        run: |
          mkdir -p release-artifacts
          git archive --format=tar.gz --output "release-artifacts/linuxdospace-zig-${RELEASE_TAG}.tar.gz" HEAD

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-artifacts
          path: release-artifacts/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-artifacts
          path: release-artifacts

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" release-artifacts/* --clobber
          else
            gh release create "${RELEASE_TAG}" release-artifacts/* --generate-notes --title "${RELEASE_TAG}"
          fi
