name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: zig-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Zig
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y curl xz-utils
          zig_url="https://ziglang.org/download/0.14.1/zig-x86_64-linux-0.14.1.tar.xz"
          curl -fsSL "${zig_url}" -o /tmp/zig.tar.xz
          mkdir -p /tmp/zig
          tar -xf /tmp/zig.tar.xz -C /tmp/zig --strip-components=1
          echo "/tmp/zig" >> "${GITHUB_PATH}"

      - name: Build package
        run: zig build
